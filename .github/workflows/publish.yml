name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish"
        required: true
        type: choice
        options:
          - yoakore
          - yoakraft
      dry_run:
        description: "Dry run (don't actually publish)"
        required: false
        type: boolean
        default: true

  # Tag push: {crate}-v{version}
  # e.g. git tag yoakraft-v0.1.0 && git push --tags
  push:
    tags:
      - "*-v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

  publish:
    name: Publish
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Parse tag
        id: tag
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CRATE="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          echo "crate=$CRATE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Parsed tag: crate=$CRATE version=$VERSION"

      - name: Resolve crate directory
        id: dir
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CRATE="${{ inputs.crate }}"
          else
            CRATE="${{ steps.tag.outputs.crate }}"
          fi

          case "$CRATE" in
            yoakore) DIR="core" ;;
            yoakraft) DIR="craft" ;;
            *) echo "::error::Unknown crate: $CRATE"; exit 1 ;;
          esac

          echo "crate=$CRATE" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Verify version matches tag
        if: github.event_name == 'push'
        run: |
          CRATE="${{ steps.dir.outputs.crate }}"
          VERSION="${{ steps.tag.outputs.version }}"
          TOML_VERSION=$(cargo metadata --format-version=1 --no-deps \
            | jq -r ".packages[] | select(.name==\"$CRATE\") | .version")

          echo "Tag version:  $VERSION"
          echo "Toml version: $TOML_VERSION"

          if [[ "$VERSION" != "$TOML_VERSION" ]]; then
            echo "::error::Tag version ($VERSION) doesn't match Cargo.toml version ($TOML_VERSION)"
            exit 1
          fi

      - name: Publish
        run: |
          CRATE="${{ steps.dir.outputs.crate }}"

          if [[ "${{ inputs.dry_run }}" == "true" && "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "=== Dry run: $CRATE ==="
            cargo publish -p "$CRATE" --dry-run
          else
            cargo publish -p "$CRATE" --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
          fi
